name: Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_deploy:
        description: "Только проверки, без деплоя"
        type: boolean
        default: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install JS deps
        run: npm ci

      - name: Install backend deps
        run: python -m pip install -r backend/requirements.txt -r backend/requirements-dev.txt

      - name: make check
        run: make check

  deploy:
    needs: check
    if: github.event_name != 'pull_request' && !(github.event_name == 'workflow_dispatch' && inputs.skip_deploy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Railway deploy (GraphQL)
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ vars.RAILWAY_PROJECT_ID }}
          RAILWAY_ENVIRONMENT_ID: ${{ vars.RAILWAY_ENVIRONMENT_ID }}
          RAILWAY_SERVICE_ID: ${{ vars.RAILWAY_SERVICE_ID }}
        run: bash scripts/railway_graphql_deploy.sh

      - name: Health smoke
        run: |
          set -euo pipefail
          url="${{ vars.PROD_HEALTH_URL }}"
          if [[ -z "${url}" ]]; then
            echo "PROD_HEALTH_URL not set — skip smoke"
            exit 0
          fi
          health="${url%/}/health"
          for attempt in $(seq 1 36); do
            if curl -sfSL --max-time 15 "${health}"; then
              echo ""
              echo "OK: ${health}"
              exit 0
            fi
            echo "not ready (${attempt}/36), sleep 10s..."
            sleep 10
          done
          echo "Health check failed: ${health}" >&2
          exit 1
