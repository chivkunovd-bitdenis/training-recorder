[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]

[tool.mypy]
python_version = "3.11"
packages = ["backend", "tests"]
ignore_missing_imports = true
strict = true

[tool.pytest.ini_options]
testpaths = ["tests/backend"]
pythonpath = ["."]
markers = [
    "integration: live API tests (require OPENAI_API_KEY)",
]
