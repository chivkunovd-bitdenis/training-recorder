name: training-recorder

services:
  api:
    build: .
    ports:
      - "${API_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: sqlite:////app/backend/data/training_recorder.db
      STORAGE_ROOT: /app/backend/storage
    volumes:
      - api_data:/app/backend/data
      - api_storage:/app/backend/storage
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    profiles:
      - with-caddy
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
    restart: unless-stopped

volumes:
  api_data:
  api_storage:
  caddy_data:
  caddy_config:
